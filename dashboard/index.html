<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dashboard — Le Petit Bougiote</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg:       #0C0C0A;
      --bg2:      #131310;
      --bg3:      #1A1A17;
      --border:   rgba(255,255,255,.07);
      --green:    #22C55E;
      --green-bg: rgba(34,197,94,.12);
      --gold:     #F59E0B;
      --gold-bg:  rgba(245,158,11,.12);
      --red:      #EF4444;
      --red-bg:   rgba(239,68,68,.1);
      --text:     #F0EDE6;
      --muted:    #6B6860;
      --muted2:   #9B9890;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: .75rem; }
    .header-logo { font-size: 1.25rem; }
    .header-title { font-size: .95rem; font-weight: 700; color: #fff; }
    .header-sub   { font-size: .72rem; color: var(--muted); margin-top: 1px; }

    .pending-badge {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: var(--gold-bg);
      border: 1px solid rgba(245,158,11,.3);
      border-radius: 50px;
      padding: .35rem .9rem;
      font-size: .82rem;
      font-weight: 700;
      color: var(--gold);
      transition: all .3s;
    }
    .pending-badge.empty { opacity: 0; pointer-events: none; }
    .pending-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold);
      animation: blink 1.5s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    .header-right { display: flex; align-items: center; gap: .75rem; }

    .conn-pill {
      display: flex; align-items: center; gap: .4rem;
      padding: .3rem .75rem;
      border-radius: 50px;
      font-size: .75rem;
      font-weight: 600;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.25);
      color: var(--green);
      transition: all .3s;
    }
    .conn-pill.off {
      background: rgba(239,68,68,.1);
      border-color: rgba(239,68,68,.25);
      color: var(--red);
    }
    .conn-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      animation: blink 2s infinite;
    }
    .conn-pill.off .conn-dot { animation: none; }

    .sound-btn, .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .35rem .7rem;
      color: var(--muted);
      cursor: pointer;
      font-size: .78rem;
      transition: all .2s;
    }
    .sound-btn:hover, .sound-btn.on { border-color: var(--green); color: var(--green); }
    .logout-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── TABS ── */
    .tab-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: .9rem 1.25rem;
      border: none;
      background: none;
      color: var(--muted);
      font-family: inherit;
      font-size: .84rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: #fff; border-bottom-color: var(--green); }

    .tab-count {
      background: var(--gold);
      color: #000;
      border-radius: 50px;
      font-size: .68rem;
      font-weight: 800;
      padding: .1rem .45rem;
      min-width: 18px;
      text-align: center;
    }

    /* ── ORDERS ── */
    .orders-wrap { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; max-width: 900px; margin: 0 auto; }

    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--muted);
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: .4; }
    .empty-text { font-size: .95rem; }

    /* ── ORDER CARD ── */
    .order-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: border-color .25s, box-shadow .25s;
    }
    .order-card.paid      { border-color: rgba(245,158,11,.35); box-shadow: 0 0 0 1px rgba(245,158,11,.1); }
    .order-card.validated { border-color: rgba(34,197,94,.25); }
    .order-card.rejected  { border-color: rgba(239,68,68,.2); opacity: .65; }
    .order-card.new-pulse { animation: cardIn .4s ease; }
    @keyframes cardIn { 0%{transform:translateY(-8px);opacity:0} 100%{transform:translateY(0);opacity:1} }

    /* Card header */
    .card-head {
      padding: .9rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }
    .card-id {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .06rem;
      color: var(--muted2);
      font-variant-numeric: tabular-nums;
      font-family: 'Courier New', monospace;
    }
    .card-timer {
      display: flex;
      align-items: center;
      gap: .3rem;
      font-size: .75rem;
      font-weight: 600;
      color: var(--gold);
      margin-left: auto;
    }
    .card-timer.urgent { color: var(--red); }
    .status-pill {
      padding: .28rem .75rem;
      border-radius: 50px;
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05rem;
    }
    .pill-paid      { background: var(--gold-bg);  color: var(--gold); border: 1px solid rgba(245,158,11,.3); }
    .pill-validated { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
    .pill-rejected  { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(239,68,68,.25); }

    /* Card body */
    .card-body { padding: 1.1rem 1.25rem; display: flex; flex-direction: column; gap: .85rem; }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      font-size: .9rem;
    }
    .info-icon { font-size: .95rem; flex-shrink: 0; margin-top: 1px; }
    .info-val  { color: var(--text); font-weight: 500; }
    .info-val a { color: var(--text); text-decoration: none; }
    .info-val a:active { color: var(--green); }

    .divider { border: none; border-top: 1px solid var(--border); }

    /* Items */
    .items-list { display: flex; flex-direction: column; gap: .3rem; }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: .9rem;
    }
    .item-name { color: var(--text); }
    .item-qty  { color: var(--muted2); font-size: .8rem; margin-left: .3rem; }
    .item-price { color: var(--gold); font-weight: 600; font-variant-numeric: tabular-nums; }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-top: .6rem;
      border-top: 1px solid var(--border);
      margin-top: .2rem;
    }
    .total-label { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05rem; color: var(--muted2); }
    .total-val   { font-size: 1.15rem; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; }

    /* Note */
    .note-box {
      background: rgba(245,158,11,.06);
      border: 1px solid rgba(245,158,11,.18);
      border-radius: 8px;
      padding: .65rem .85rem;
      font-size: .85rem;
      color: var(--muted2);
    }
    .note-label { font-weight: 700; color: var(--gold); margin-right: .4rem; }

    /* Actions */
    .card-actions {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: .75rem;
    }

    .btn {
      flex: 1;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .4rem;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-validate {
      background: var(--green);
      color: #fff;
      flex: 2;
    }
    .btn-validate:hover:not(:disabled) { background: #16A34A; }

    .btn-reject {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid rgba(239,68,68,.3);
      flex: 1;
    }
    .btn-reject:hover:not(:disabled) { background: rgba(239,68,68,.2); }

    .btn-confirm {
      background: var(--green);
      color: #fff;
      flex: 1;
      font-size: 1rem;
    }
    .btn-confirm:hover:not(:disabled) { background: #16A34A; }

    .btn-cancel {
      background: var(--bg3);
      color: var(--muted2);
      border: 1px solid var(--border);
      flex: 0 0 auto;
      padding: 1rem 1.25rem;
    }
    .btn-cancel:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

    .confirm-label {
      font-size: .78rem;
      color: var(--muted2);
      text-align: center;
      margin-bottom: .5rem;
      font-weight: 500;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--bg3);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 14px;
      padding: .9rem 1.6rem;
      font-size: .9rem;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      opacity: 0;
      z-index: 999;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: rgba(34,197,94,.35); }
    #toast.error   { border-color: rgba(239,68,68,.35); }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="header-logo">🍔</span>
    <div>
      <div class="header-title">Le Petit Bougiote</div>
      <div class="header-sub">Dashboard commandes</div>
    </div>
  </div>

  <div class="pending-badge" id="pending-badge">
    <span class="pending-dot"></span>
    <span id="pending-text">0 en attente</span>
  </div>

  <div class="header-right">
    <button class="sound-btn on" id="sound-btn" onclick="toggleSound()">🔔</button>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
    <div class="conn-pill" id="conn-pill">
      <span class="conn-dot"></span>
      <span id="conn-label">Connecté</span>
    </div>
  </div>
</header>

<nav class="tab-bar">
  <button class="tab-btn active" onclick="filterTab('paid', this)">
    À traiter <span class="tab-count" id="badge-paid" style="display:none">0</span>
  </button>
  <button class="tab-btn" onclick="filterTab('validated', this)">Validées</button>
  <button class="tab-btn" onclick="filterTab('rejected',  this)">Refusées</button>
  <button class="tab-btn" onclick="filterTab('all',       this)">Toutes</button>
</nav>

<div id="toast"></div>
<main class="orders-wrap" id="orders-wrap"></main>

<script>
let orders = {};
let currentFilter = 'paid';
let soundOn = true;
let toastTimer;

// ── Helpers ──────────────────────────────────────────────────────

function cents(n) {
  return (n / 100).toFixed(2).replace('.', ',') + ' €';
}

function elapsed(dateStr) {
  if (!dateStr) return '';
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (diff < 1)  return 'à l\'instant';
  if (diff < 60) return `il y a ${diff} min`;
  const h = Math.floor(diff / 60);
  return `il y a ${h}h`;
}

function statusLabel(s) {
  return { paid: 'En attente', validated: 'Validée', rejected: 'Refusée', pending: 'Paiement...' }[s] || s;
}

function pillClass(s) {
  return { paid: 'pill-paid', validated: 'pill-validated', rejected: 'pill-rejected' }[s] || '';
}

// ── Toast ─────────────────────────────────────────────────────────

function showToast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// ── Sound ─────────────────────────────────────────────────────────

function toggleSound() {
  soundOn = !soundOn;
  const btn = document.getElementById('sound-btn');
  btn.textContent = soundOn ? '🔔' : '🔕';
  btn.classList.toggle('on', soundOn);
}

function playDing() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

// ── Tabs ──────────────────────────────────────────────────────────

function filterTab(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Render ────────────────────────────────────────────────────────

function render() {
  const wrap = document.getElementById('orders-wrap');
  let list = Object.values(orders).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  if (currentFilter !== 'all') list = list.filter(o => o.status === currentFilter);

  const paidList = Object.values(orders).filter(o => o.status === 'paid');
  const badge = document.getElementById('badge-paid');
  const pendingBadge = document.getElementById('pending-badge');
  const pendingText  = document.getElementById('pending-text');

  if (paidList.length > 0) {
    badge.textContent = paidList.length;
    badge.style.display = 'inline-flex';
    pendingBadge.classList.remove('empty');
    pendingText.textContent = paidList.length + (paidList.length > 1 ? ' en attente' : ' en attente');
  } else {
    badge.style.display = 'none';
    pendingBadge.classList.add('empty');
  }

  if (list.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${currentFilter === 'paid' ? '⏳' : '📋'}</div>
        <div class="empty-text">${currentFilter === 'paid' ? 'Aucune commande en attente' : 'Aucune commande'}</div>
      </div>`;
    return;
  }

  wrap.innerHTML = list.map(o => renderCard(o)).join('');
}

function renderCard(o) {
  const items = Array.isArray(o.items) ? o.items : JSON.parse(o.items || '[]');
  const total = o.total_eur ? o.total_eur + ' €' : cents(o.total);
  const isPaid = o.status === 'paid';
  const mins = o.created_at ? Math.floor((Date.now() - new Date(o.created_at)) / 60000) : 0;
  const timerClass = mins >= 10 ? 'card-timer urgent' : 'card-timer';

  return `
    <div class="order-card ${o.status}" id="order-${o.id}">

      <div class="card-head">
        <span class="card-id">#${o.id.slice(0,8).toUpperCase()}</span>
        <span class="status-pill ${pillClass(o.status)}">${statusLabel(o.status)}</span>
        ${isPaid ? `<span class="${timerClass}">⏱ ${elapsed(o.created_at)}</span>` : `<span style="margin-left:auto;font-size:.75rem;color:var(--muted)">${(o.created_at||'').replace('T',' ').slice(0,16)}</span>`}
      </div>

      <div class="card-body">
        <div>
          <div class="info-row">
            <span class="info-icon">👤</span>
            <span class="info-val">${o.customer}</span>
          </div>
          <div class="info-row" style="margin-top:.45rem">
            <span class="info-icon">📞</span>
            <span class="info-val"><a href="tel:${o.phone}">${o.phone}</a></span>
          </div>
          <div class="info-row" style="margin-top:.45rem">
            <span class="info-icon">📍</span>
            <span class="info-val">${o.address}</span>
          </div>
        </div>

        <hr class="divider" />

        <div class="items-list">
          ${items.map(i => `
            <div class="item-row">
              <span class="item-name">${i.name} <span class="item-qty">× ${i.qty}</span></span>
              <span class="item-price">${cents(i.price * i.qty)}</span>
            </div>
          `).join('')}
          <div class="total-row">
            <span class="total-label">Total payé</span>
            <span class="total-val">${total}</span>
          </div>
        </div>

        ${o.note ? `
          <div class="note-box">
            <span class="note-label">Note :</span>${o.note}
          </div>
        ` : ''}
      </div>

      ${isPaid ? `
        <div class="card-actions" id="actions-${o.id}">
          <button class="btn btn-reject"   onclick="askConfirm('${o.id}','reject')">❌ Refuser</button>
          <button class="btn btn-validate" onclick="askConfirm('${o.id}','validate')">✅ Valider — Notifier le livreur</button>
        </div>
      ` : ''}
    </div>
  `;
}

// ── Confirm inline ────────────────────────────────────────────────

function askConfirm(id, action) {
  const actionsEl = document.getElementById(`actions-${id}`);
  if (!actionsEl) return;

  const isValidate = action === 'validate';
  actionsEl.innerHTML = `
    <div style="width:100%">
      <div class="confirm-label">${isValidate ? 'Confirmer et envoyer le WhatsApp au livreur ?' : 'Refuser et rembourser le client ?'}</div>
      <div style="display:flex;gap:.75rem">
        <button class="btn btn-cancel" onclick="render()">↩ Annuler</button>
        <button class="btn btn-confirm" onclick="doAction('${id}','${action}')">
          ${isValidate ? '✅ Confirmer' : '❌ Confirmer le refus'}
        </button>
      </div>
    </div>
  `;
}

// ── Action ────────────────────────────────────────────────────────

async function doAction(id, action) {
  const actionsEl = document.getElementById(`actions-${id}`);
  if (actionsEl) actionsEl.querySelectorAll('button').forEach(b => b.disabled = true);

  const url = `/api/orders/${id}/${action === 'validate' ? 'validate' : 'reject'}`;
  const res = await fetch(url, { method: 'POST' });

  await syncOrders();
  render();

  if (res.ok) {
    showToast(
      action === 'validate' ? '✅ Commande validée — WhatsApp envoyé !' : '🔄 Commande refusée — Remboursement lancé.',
      'success'
    );
  } else {
    const data = await res.json().catch(() => ({}));
    showToast('❌ ' + (data.error || 'Erreur inconnue'), 'error');
  }
}

async function syncOrders() {
  try {
    const res  = await fetch('/api/orders');
    if (res.status === 401) { window.location.href = '/dashboard/login'; return; }
    const list = await res.json();
    list.forEach(o => { orders[o.id] = o; });
  } catch(e) {}
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/dashboard/login';
}

// ── SSE ───────────────────────────────────────────────────────────

function connectSSE() {
  const es     = new EventSource('/api/orders/events');
  const pill   = document.getElementById('conn-pill');
  const label  = document.getElementById('conn-label');

  es.onopen = () => {
    pill.classList.remove('off');
    label.textContent = 'Connecté';
  };

  es.onmessage = (e) => {
    const order = JSON.parse(e.data);
    const isNew = !orders[order.id] && order.status === 'paid';

    if (!orders[order.id] || order.status !== 'paid' || orders[order.id].status === 'paid') {
      orders[order.id] = order;
    }

    if (isNew) {
      playDing();
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('🔔 Nouvelle commande !', {
          body: `${order.customer} — ${order.total_eur || ''}€`,
        });
      }
    }
    render();
  };

  es.onerror = () => {
    pill.classList.add('off');
    label.textContent = 'Déconnecté';
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── Init ──────────────────────────────────────────────────────────

async function init() {
  await syncOrders();
  render();
  connectSSE();

  // Refresh les timers toutes les 30s
  setInterval(render, 30000);

  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

init();
</script>
</body>
</html>
